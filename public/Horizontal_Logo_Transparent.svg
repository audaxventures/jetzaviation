<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 96" fill="none">
  <!-- Jetz text -->
  <text x="8" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="400" fill="#1C5266" letter-spacing="-0.5">Jetz</text>
  <!-- Aviation text -->
  <text x="10" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" fill="#1C5266" letter-spacing="0.2">Aviation</text>

  <!-- Geometric paper plane / arrow icon (right side) -->
  <!-- Outer silhouette: tip upper-right, tail lower-left with angular notch -->
  <path d="M328,10 L248,52 L262,44 L268,70 L278,56 L328,10 Z"
        stroke="#1C5266" stroke-width="2.2" fill="none"
        stroke-linejoin="miter" stroke-linecap="square"/>
  <!-- Internal fold line from tip to inner notch -->
  <line x1="328" y1="10" x2="262" y2="44" stroke="#1C5266" stroke-width="1.6"/>
</svg>
